# Copy to .github/workflows/slowmonster.yml in a SOURCE repo.
# Requires, in that repo:
#   - scripts/slowmonster-sync.mjs   (copy from clavef/monster)
#   - .slowmonster.json              ({ "id": "<id>", "repo": "studiohaze/<id>",
#                                       "disclose": ["README.md"] } — disclose optional)
#   - repo secret SLOWMONSTER_TOKEN  (fine-grained PAT: clavef/monster, Contents: RW)
# On every push to the default branch it extracts vitals and publishes them to
# slow.monster. No source leaves the repo except files named in `disclose`
# (read at HEAD, size-capped) — plus the aggregate JSON that sync.mjs prints.

name: slow.monster vitals

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"   # weekly — slides the 14-week pulse window even when no one pushes
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main                 # schedule/dispatch publish the same branch as push
          fetch-depth: 0            # full history: commit count + 14-week pulse

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: extract vitals
        run: node scripts/slowmonster-sync.mjs --out vitals.json

      - name: publish to slow.monster
        env:
          TOKEN: ${{ secrets.SLOWMONSTER_TOKEN }}
        run: |
          node -e '
            const fs = require("fs");
            const vitals = JSON.parse(fs.readFileSync("vitals.json", "utf8"));
            fetch("https://api.github.com/repos/clavef/monster/dispatches", {
              method: "POST",
              headers: {
                Authorization: "token " + process.env.TOKEN,
                Accept: "application/vnd.github+json",
                "Content-Type": "application/json",
                "User-Agent": "slowmonster-sync",
              },
              body: JSON.stringify({ event_type: "slowmonster-vitals", client_payload: { vitals } }),
            }).then(async (r) => {
              if (!r.ok) { console.error("dispatch failed", r.status, await r.text()); process.exit(1); }
              console.log("published vitals for", vitals.id);
            }).catch((e) => { console.error(e); process.exit(1); });
          '
